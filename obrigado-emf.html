    <style>
        :root {
            --deep-space: #020617;
            --accent-gold: #d4af37;
            --gold-light: #f1d279;
            --gold-dark: #b8860b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--deep-space);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Universe Background */
        .universe-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1931 0%, #020617 100%);
            z-index: -2;
        }
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        /* Success Card */
        .success-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 60px;
            backdrop-filter: blur(10px);
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(56, 161, 105, 0.1);
            color: #38a169;
            font-size: 40px;
            margin: 0 auto 20px;
            border: 2px solid #38a169;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--gold-light), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .success-card p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .video-label {
            font-size: 1.1rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
            font-weight: 600;
            display: block;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--accent-gold);
            background-color: #000;
            margin-bottom: 30px;
        }

        .video-wrapper video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .btn-wpp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            padding: 22px;
            background: #25D366;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            margin-bottom: 40px;
        }
        .btn-wpp:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5);
            background: #128C7E;
        }
        .btn-wpp svg { margin-right: 12px; width: 28px; height: 28px; fill: currentColor; }

        .footer { text-align: center; padding: 60px 0; color: var(--text-muted); font-size: 0.9rem; }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 40px 20px; }
        }

        /* Video Container Nativo */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--accent-gold);
            background-color: #000;
            margin-bottom: 30px;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

    <div class="container">
        
        <!-- Welcome Section -->
        <div class="success-card">

            <h1>Inscrição Confirmada!</h1>
            <p>Seja bem-vindo ao <strong>Treinamento EMF Fases I-IV</strong>. Suas instruções de acesso e cronograma foram enviados para o seu e-mail.</p>
        </div>

        <div style="margin-bottom: 40px;">
            <span class="video-label">✦ Assista à mensagem do Gustavo abaixo:</span>
            <div class="video-wrapper">
                <video id="vsl-video" preload="auto" autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover;">
                    <source src="assets/video/vsl-emf.mp4" type="video/mp4">
                </video>
            </div>

            <script>
                (function() {
                    const video = document.getElementById('vsl-video');
                    const wppLink = document.getElementById('wpp-link');
                    
                    video.muted = true;
                    const forcePlay = () => {
                        video.play().catch(() => setTimeout(forcePlay, 100));
                    };
                    const activateAudio = (e) => {
                        if (e && e.target && (e.target === wppLink || wppLink.contains(e.target))) {
                            return;
                        }
                        video.muted = false;
                        video.volume = 1;
                        video.play().catch(() => {});
                        ['click', 'wheel', 'touchstart', 'scroll'].forEach(ev => {
                            window.removeEventListener(ev, activateAudio);
                        });
                    };
                    window.addEventListener('load', forcePlay);
                    ['click', 'wheel', 'touchstart', 'scroll'].forEach(ev => {
                        window.addEventListener(ev, activateAudio);
                    });
                })();
            </script>
